<!DOCTYPE html>
<html>
<head>
  <title>Patchflow Login</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="favicon.ico" />
</head>
<body>

<div class="app-bg">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-head">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>Patchflow</h1>
          <p>Sign in to continue</p>
        </div>
      </div>

      <input class="field" type="email" id="loginEmail" placeholder="Enter email" autocomplete="email" />
      <button class="btn primary" onclick="login()">Login</button>

      <p id="loginStatus" class="status-text"></p>

      <div class="demo-users">
        <div style="font-weight: 800; color: #334155; margin-bottom: 6px;">Demo users</div>
        <div>admin@test.com</div>
        <div>patch@test.com</div>
        <div>user@test.com</div>
        <div>read@test.com</div>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
